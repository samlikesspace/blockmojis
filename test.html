<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #FFF9F2; } /* Off-white background from your image */
        #noodle-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            width: 100vw; height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="noodle-canvas"></canvas>

    <script>
        const canvas = document.getElementById('noodle-canvas');
        const ctx = canvas.getContext('2d');

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawNoodles();
        }

        function drawNoodles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Style settings based on your image
            ctx.lineWidth = 18; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Subtle color (change to 'red', 'green', etc., if you want the bold colors)
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)'; 

            const spacing = 120; // How far apart the lines start
            for (let x = 0; x < canvas.width; x += spacing) {
                for (let y = 0; y < canvas.height; y += spacing) {
                    if (Math.random() > 0.6) { // Adds some random negative space
                        generateNoodle(x, y);
                    }
                }
            }
        }

        function generateNoodle(startX, startY) {
            ctx.beginPath();
            let x = startX;
            let y = startY;
            ctx.moveTo(x, y);

            let angle = Math.random() * Math.PI * 2;
            const segments = 15; // Length of the noodle
            const step = 40;     // Distance between curves

            for (let i = 0; i < segments; i++) {
                // This creates the "loopy" effect by gently shifting the angle
                angle += (Math.random() - 0.5) * 3; 
                
                let cp1x = x + Math.cos(angle) * step;
                let cp1y = y + Math.sin(angle) * step;
                
                let nx = x + Math.cos(angle) * step * 1.5;
                let ny = y + Math.sin(angle) * step * 1.5;

                ctx.quadraticCurveTo(cp1x, cp1y, nx, ny);
                
                x = nx;
                y = ny;

                // Stop if it goes too far off screen
                if (x < -100 || x > canvas.width + 100 || y < -100 || y > canvas.height + 100) break;
            }
            ctx.stroke();
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
